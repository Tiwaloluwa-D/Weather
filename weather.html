<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="main">
        <div class="header">
            <h1>Lagos Nigeria</h1>
            <p id="day">Tuesday, 19 May 2026</p>
            <div class="icon">
                <i class="fa-solid fa-cloud-sun"></i>
                <p id="two">28°c</p>
                <p id="Partly">Partly Cloudy</p>
            </div>
        </div>
        <hr>
        <div class="middle">
            <div class="stat">
                <p class="head">Humidity</p>
                <p class="child">72%</p>
            </div>
            <div class="stat">
                <p class="head">Wind</p>
                <p class="child">14km/h</p>
            </div>
            <div class="stat">
            <p class="head">Feels Like</p>
            <p class="child">31°c</p>
            </div>
        </div>
        <hr>
         <div class="search">
            <input type="search" placeholder="Enter city name..." name="search" id="search"> <button>Search</button>
        </div>
    </div>
</body>
</html>
